<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Card background -->
  <rect width="32" height="32" rx="5" fill="#0a0818"/>

  <!-- Outer border -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="4" fill="none" stroke="#7c3aed" stroke-width="1"/>

  <!-- Inner border -->
  <rect x="3.5" y="3.5" width="25" height="25" rx="2.5" fill="none" stroke="#fbbf24" stroke-width="0.6" stroke-dasharray="2 1.5"/>

  <!-- Corner ornaments -->
  <circle cx="5" cy="5" r="1" fill="#fbbf24" opacity="0.7"/>
  <circle cx="27" cy="5" r="1" fill="#fbbf24" opacity="0.7"/>
  <circle cx="5" cy="27" r="1" fill="#fbbf24" opacity="0.7"/>
  <circle cx="27" cy="27" r="1" fill="#fbbf24" opacity="0.7"/>

  <!-- Diamond shape -->
  <polygon points="16,7 21,16 16,25 11,16" fill="#1e1040" stroke="#7c3aed" stroke-width="0.8"/>

  <!-- Star in center -->
  <polygon points="16,11.5 16.9,14.2 19.8,14.2 17.5,15.9 18.3,18.6 16,16.9 13.7,18.6 14.5,15.9 12.2,14.2 15.1,14.2" fill="#fbbf24"/>
</svg>
